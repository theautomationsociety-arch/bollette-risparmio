services:
  bollettaai:
    build: .
    container_name: bollettaai
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      # ── OBBLIGATORIO ──────────────────────────────────────
      - GEMINI_API_KEY=${GEMINI_API_KEY}

      # ── SICUREZZA ─────────────────────────────────────────
      - ADMIN_TOKEN=${ADMIN_TOKEN:-admin123}

      # ── EMAIL (Resend) ─────────────────────────────────────
      # Lascia vuoto per disabilitare — il sito funziona anche senza
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - FROM_EMAIL=${FROM_EMAIL:-BollettaAI <onboarding@resend.dev>}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - SITE_URL=${SITE_URL:-https://bollette-risparmio.onrender.com}

      # ── CORS ──────────────────────────────────────────────
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
