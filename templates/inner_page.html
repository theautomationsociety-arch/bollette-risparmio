{% extends "base.html" %}

{% block extra_css %}
<style>
/* ── INNER PAGE HERO ── */
.page-hero {
  background: linear-gradient(135deg, var(--primary) 0%, #1d4ed8 55%, #163272 100%);
  padding: 4rem 1.5rem 3rem;
  position: relative; overflow: hidden;
}
.page-hero::after {
  content: '';
  position: absolute; bottom: -2px; left: 0; right: 0;
  height: 50px; background: var(--white);
  clip-path: ellipse(55% 100% at 50% 100%);
}
.page-hero-inner { max-width: 860px; margin: 0 auto; position: relative; z-index: 1; }
.page-badge {
  display: inline-flex; align-items: center; gap: .5rem;
  background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
  color: rgba(255,255,255,.9); padding: .3rem .85rem;
  border-radius: 50px; font-size: .75rem; font-weight: 600;
  letter-spacing: .05em; margin-bottom: 1rem;
}
.page-hero h1 {
  font-family: 'Sora', sans-serif;
  font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 800;
  color: #fff; line-height: 1.15; margin-bottom: .75rem;
}
.page-hero > .page-hero-inner > p {
  font-size: 1rem; color: rgba(255,255,255,.78); max-width: 560px; margin-bottom: 1.5rem;
}
.page-hero-actions { display: flex; gap: .9rem; flex-wrap: wrap; }
.btn-hero-primary {
  background: var(--accent); color: #fff; border: none; border-radius: 10px;
  padding: .8rem 1.6rem; font-family: 'Sora', sans-serif; font-size: .9rem; font-weight: 700;
  text-decoration: none; display: inline-flex; align-items: center; gap: .4rem;
  transition: all .2s; box-shadow: 0 4px 16px rgba(0,0,0,.2);
}
.btn-hero-primary:hover { background: #1976d2; transform: translateY(-2px); }
.btn-hero-secondary {
  background: rgba(255,255,255,.1); color: #fff; border: 1.5px solid rgba(255,255,255,.3);
  border-radius: 10px; padding: .8rem 1.6rem; font-family: 'Sora', sans-serif;
  font-size: .9rem; font-weight: 600; text-decoration: none;
  display: inline-flex; align-items: center; gap: .4rem; transition: all .2s;
}
.btn-hero-secondary:hover { background: rgba(255,255,255,.18); }

/* ── PAGE CONTENT ── */
.page-content { max-width: 1100px; margin: 0 auto; padding: 3rem 1.5rem 5rem; }
.section-label-inner { font-size: .75rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); margin-bottom: .5rem; }
.section-title-inner { font-family: 'Sora', sans-serif; font-size: clamp(1.4rem, 2.5vw, 1.9rem); font-weight: 800; color: var(--primary); line-height: 1.2; margin-bottom: .75rem; }
.section-sub-inner   { font-size: .93rem; color: var(--muted); max-width: 560px; margin-bottom: 2rem; }

/* ── CTA BOTTOM ── */
.cta-bottom { background: linear-gradient(135deg, var(--primary), #1d4ed8); border-radius: 20px; padding: 3rem 2rem; text-align: center; margin-top: 3rem; }
.cta-bottom h2 { font-family: 'Sora', sans-serif; font-size: 1.5rem; font-weight: 800; color: #fff; margin-bottom: .6rem; }
.cta-bottom p  { color: rgba(255,255,255,.75); font-size: .93rem; margin-bottom: 1.75rem; }
.cta-btn-group { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
.btn-cta-white {
  background: #fff; color: var(--primary); border: none; border-radius: 10px;
  padding: .8rem 1.75rem; font-family: 'Sora', sans-serif; font-size: .9rem; font-weight: 700;
  text-decoration: none; transition: all .2s; display: inline-flex; align-items: center; gap: .4rem;
}
.btn-cta-white:hover  { background: var(--accent); color: #fff; }
.btn-cta-outline {
  background: transparent; color: #fff; border: 2px solid rgba(255,255,255,.35);
  border-radius: 10px; padding: .8rem 1.75rem; font-family: 'Sora', sans-serif;
  font-size: .9rem; font-weight: 600; text-decoration: none; transition: all .2s;
  display: inline-flex; align-items: center; gap: .4rem;
}
.btn-cta-outline:hover { border-color: #fff; background: rgba(255,255,255,.08); }
</style>
{% endblock %}
